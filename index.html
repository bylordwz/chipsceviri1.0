<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chips Çeviri 1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Chips Çeviri 1.0</h1>
        <div class="translator-box">
            <div class="input-section">
                <h3 id="inputLabel">Normal Türkçe</h3>
                <textarea id="inputText" placeholder="Çevirmek istediğiniz metni buraya yazın..."></textarea>
            </div>
            <div class="controls">
                <button id="switchBtn">🔄 Yön Değiştir</button>
                <button id="translateBtn">Çevir!</button>
            </div>
            <div class="output-section">
                <h3 id="outputLabel">Chips Türkçesi</h3>
                <pre id="outputText" class="output-area"></pre>
            </div>
        </div>
        <footer>
            <p>Yapımcı: <a href="https://github.com/bylordwz" target="_blank">bylordwz</a></p>
            <p>Versiyon: 1.0</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
